  <!-- status = "open_to_work"  // ● open to hire -->
  <text x="50" y="272"
    font-family="'Courier New',Courier,monospace"
    font-size="16"
    fill="#79C0FF">status</text>
  <text x="148" y="272"
    font-family="'Courier New',Courier,monospace"
    font-size="16"
    fill="#C9D1D9">=</text>
  <text x="168" y="272"
    font-family="'Courier New',Courier,monospace"
    font-size="16"
    fill="#3FB950">"open_to_work"</text>
  <text x="390" y="272"
    font-family="'Courier New',Courier,monospace"
    font-size="16"
    fill="#6A9955">  // ● open to hire</text>

  <!-- } -->
  <text x="32" y="298"
    font-family="'Courier New',Courier,monospace"
    font-size="16"
    fill="#C9D1D9">}</text>

