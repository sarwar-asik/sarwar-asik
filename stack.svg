  <text x="16" y="76"
    font-family="'Courier New',Courier,monospace"
    font-size="13" font-weight="bold" fill="#F78166">Async/RT</text>
  <text x="124" y="76"
    font-family="'Courier New',Courier,monospace"
    font-size="13" fill="#C9D1D9">Socket.IO · WebRTC · RabbitMQ · BullMQ · Redis pub/sub · Pusher</text>

  <!-- Row 3 · Databases -->
  <text x="16" y="115"
    font-family="'Courier New',Courier,monospace"
    font-size="13" font-weight="bold" fill="#58A6FF">Databases</text>
  <text x="124" y="115"
    font-family="'Courier New',Courier,monospace"
