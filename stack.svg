<svg viewBox="0 0 900 234" fill="none" xmlns="http://www.w3.org/2000/svg">

  <!-- Background -->
  <rect width="900" height="234" fill="#0D1117" rx="8"/>

  <!-- Vertical category separator -->
  <line x1="112" y1="14" x2="112" y2="220" stroke="#21262D" stroke-width="1"/>

  <!-- Horizontal row dividers -->
  <line x1="14" y1="53"  x2="886" y2="53"  stroke="#161B22" stroke-width="1"/>
  <line x1="14" y1="92"  x2="886" y2="92"  stroke="#161B22" stroke-width="1"/>
  <line x1="14" y1="131" x2="886" y2="131" stroke="#161B22" stroke-width="1"/>
  <line x1="14" y1="170" x2="886" y2="170" stroke="#161B22" stroke-width="1"/>
  <line x1="14" y1="209" x2="886" y2="209" stroke="#161B22" stroke-width="1"/>

  <!-- Row 1 · Backend -->
  <text x="16" y="37"
