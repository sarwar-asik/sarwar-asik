<svg viewBox="0 0 900 254" fill="none" xmlns="http://www.w3.org/2000/svg">

  <!-- Background -->
  <rect width="900" height="254" fill="#0D1117" rx="10"/>

  <!-- Title bar -->
  <rect width="900" height="38" fill="#161B22" rx="10"/>
  <rect y="28" width="900" height="10" fill="#161B22"/>

  <!-- macOS traffic lights -->
  <circle cx="26" cy="19" r="6" fill="#FF5F57"/>
  <circle cx="48" cy="19" r="6" fill="#FEBC2E"/>
  <circle cx="70" cy="19" r="6" fill="#28C840"/>

  <!-- Terminal title -->
  <text x="450" y="24"
    font-family="'Courier New',Courier,monospace"
