  <text x="130" y="144"
    font-family="'Courier New',Courier,monospace"
    font-size="15" fill="#C9D1D9">:</text>
  <text x="148" y="144"
    font-family="'Courier New',Courier,monospace"
    font-size="15" fill="#A5D6FF">"Microservices  ·  Real-time Systems  ·  High-traffic APIs"</text>
  <text x="688" y="144"
    font-family="'Courier New',Courier,monospace"
